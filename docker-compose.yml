services:

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ocweb
      POSTGRES_USER: ocweb
      POSTGRES_PASSWORD: ocweb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ocweb
      RABBITMQ_DEFAULT_PASS: ocweb
    ports:
      - "5672:5672"

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
      - ./media/pdfs:/app/media/pdfs
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=ocweb.settings.dev
    depends_on:
      - db
      - rabbitmq

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    command: celery -A ocweb worker -l info
    volumes:
      - .:/app
      - ./media/pdfs:/app/media/pdfs
      # Live-reload build scripts in dev without rebuilding the worker image
      - ./Build/scripts:/opt/ocbuild/Build/scripts
      - ./Build/template:/opt/ocbuild/Build/template
      - ./arara-rules:/opt/ocbuild/arara-rules
    env_file: .env
    environment:
      - DJANGO_SETTINGS_MODULE=ocweb.settings.dev
    depends_on:
      - db
      - rabbitmq

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_URL=http://web:8000
    depends_on:
      - web

volumes:
  postgres_data:
  frontend_node_modules:
