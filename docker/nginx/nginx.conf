upstream django {
    server web:8000;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
# Anything arriving on port 80 (direct or via the 8080 port map) is
# redirected to HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /etc/letsencrypt/live/openchapters.materials.cmu.edu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openchapters.materials.cmu.edu/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    client_max_body_size 10M;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' challenges.cloudflare.com cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; frame-src challenges.cloudflare.com 'self'; font-src 'self' cdn.jsdelivr.net;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── React SPA ─────────────────────────────────────────────────────────────
    # Serve Vite build output; fall back to index.html for client-side routing.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    # ── Django (API + admin + static) ─────────────────────────────────────────
    # Proxy /api/, /admin/, and /static/ (whitenoise) to gunicorn.
    location ~ ^/(api|admin|static)/ {
        proxy_pass http://django;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
