services:

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      # Let's Encrypt certs live on the host. nginx reads them from the
      # paths referenced in docker/nginx/nginx.conf. Renewal is handled
      # by the host's certbot timer; restart this container after a
      # renewal so nginx reloads the new cert.
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      web:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      # Healthcheck hits HTTPS on localhost; -k skips cert verification
      # because the container sees the cert via SNI = 'localhost'.
      test: ["CMD-SHELL", "curl -kf https://localhost/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.prod
    command: gunicorn ocweb.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    volumes:
      - media_pdfs:/app/media/pdfs
      - media_html:/app/media/html
      - media_html_books:/app/media/html_books
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=ocweb.settings.prod
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health/')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    command: celery -A ocweb worker -l info --concurrency 4 --max-tasks-per-child 100
    volumes:
      - media_pdfs:/app/media/pdfs
      - media_html:/app/media/html
      - media_html_books:/app/media/html_books
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=ocweb.settings.prod
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # Celery Beat — schedules periodic tasks defined in
  # ocweb/settings/base.py:CELERY_BEAT_SCHEDULE (nightly chapter sync
  # + stale HTML rebuilds when HTML_BUILD_ENABLED=True). Must run
  # exactly ONE replica; running more than one double-fires tasks.
  #
  # --schedule points at a writable, persistent location; the default
  # (celerybeat-schedule in CWD) lives under /app which is root-owned
  # and would give "Permission denied" under the ocweb user.
  beat:
    build:
      context: .
      dockerfile: docker/web/Dockerfile.prod
    command: celery -A ocweb beat -l info --schedule=/app/beat/celerybeat-schedule
    volumes:
      - beat_data:/app/beat
    env_file: .env.prod
    environment:
      - DJANGO_SETTINGS_MODULE=ocweb.settings.prod
    depends_on:
      db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    env_file: .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ocweb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-alpine
    env_file: .env.prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data_prod:
  media_pdfs:
  media_html:
  media_html_books:
  beat_data:
